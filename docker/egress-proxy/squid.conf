# Proxy de sortie dédié — seule porte vers Internet pour claude-sandbox.
# ACL stricte : uniquement CONNECT HTTPS vers api.anthropic.com. Tout le reste refusé.
# Si Claude Code a besoin d'un autre domaine Anthropic au démarrage réel (télémétrie,
# etc.), l'ajouter à anthropic_domains ci-dessous — c'est le seul point à étendre.

http_port 3128

acl anthropic_domains dstdomain api.anthropic.com
acl SSL_ports port 443
acl CONNECT method CONNECT

http_access allow anthropic_domains CONNECT SSL_ports
http_access deny CONNECT
http_access deny all

# Pas de cache, pas de contenu à conserver — relais pur
cache deny all
access_log none
cache_log /dev/null
