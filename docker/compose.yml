networks:
  # Créé par mcp-services (external: true) — claude-sandbox le rejoint pour atteindre
  # les conteneurs MCP (Gmail, Drive, Calendar, Jira, IMAP, Freebox, infra). internal:
  # true côté définition mcp-services — aucune route vers Internet depuis ce réseau.
  # Voir docs/adr/ADR-001-isolation-reseau-mcp-net.md.
  mcp-sandbox-net:
    external: true

  # Sortie Internet réelle, réservée à egress-proxy — jamais rejoint par le conteneur
  # claude lui-même.
  egress-net:
    driver: bridge

services:
  egress-proxy:
    build:
      context: ./egress-proxy
      dockerfile: Dockerfile
    image: claude-sandbox/egress-proxy:latest
    read_only: true
    tmpfs:
      - /var/spool/squid:size=16m
      - /var/log/squid:size=8m
      - /var/run:size=4m
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    networks: [mcp-sandbox-net, egress-net]
    restart: "no"

  claude:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-sandbox:latest

    # Système de fichiers en lecture seule — les écritures hors volumes échouent
    read_only: true

    # Tmpfs pour les zones d'écriture système nécessaires au runtime
    tmpfs:
      - /tmp:size=256m,mode=1777
      - /home/user/.npm:size=64m    # cache npm si nécessaire
      - /run:size=16m

    # Sécurité : supprimer toutes les capabilities Linux
    cap_drop:
      - ALL
    # Aucune capability ajoutée — Claude Code n'en a pas besoin

    security_opt:
      - no-new-privileges:true  # interdit l'escalade de privilèges via setuid/setgid

    # Utilisateur non privilégié (doit correspondre au uid/gid de l'image)
    user: "1000:1000"

    # Uniquement mcp-sandbox-net — aucune autre route réseau, ni Internet ni poste
    # hôte (voir docs/adr/ADR-001-isolation-reseau-mcp-net.md).
    networks: [mcp-sandbox-net]

    depends_on: [egress-proxy]

    # Volumes montés depuis l'hôte
    volumes:
      # Config et mémoire Claude Code — lecture/écriture (Claude doit pouvoir sauvegarder)
      - type: bind
        source: ${HOME}/.claude
        target: /home/user/.claude
        read_only: false

      # Config MCP locale : tous les services mcp-services référencés par leur nom DNS
      # Docker (voir config/mcp.json) — plus de credentials ni de commande npx ici.
      - type: bind
        source: ${PWD}/../config/mcp.json
        target: /home/user/.claude.json
        read_only: true

      # Code — tout ~/www (perso www/c/ et pro www/e/), en écriture (le LLM doit
      # pouvoir modifier le code). Monté au même chemin absolu que sur l'hôte (pas
      # /workspace) pour ne pas casser les références de chemin dans les fichiers
      # (CLAUDE.md, scripts...). Décision Cédric 2026-07-11, voir ADR-003.
      - type: bind
        source: ${HOME}/www
        target: /home/cedric/www
        read_only: false

      # Vault Obsidian — lecture/écriture, même chemin absolu que l'hôte pour les
      # mêmes raisons (wiki, orga.perso.md, orga.claude.md référencent des chemins
      # absolus entre eux). Décision Cédric 2026-07-11, voir ADR-003.
      - type: bind
        source: ${HOME}/Sync/Central/Dossiers/obsidian
        target: /home/cedric/Sync/Central/Dossiers/obsidian
        read_only: false

      # Dossier d'échange — convention ~/Work/cnt/<nom-conteneur>, réutilisable pour
      # de futurs conteneurs. Voir ADR-003.
      - type: bind
        source: ${HOME}/Work/cnt/claude-sandbox
        target: /exchange
        read_only: false

    # Variables d'environnement transmises depuis l'hôte
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HOME=/home/user
      # Seule sortie réseau autorisée — voir egress-proxy/squid.conf pour l'ACL.
      - HTTPS_PROXY=http://egress-proxy:3128
      - HTTP_PROXY=http://egress-proxy:3128

    # Mode interactif (nécessaire pour Claude Code TUI)
    stdin_open: true
    tty: true

    # Pas de restart automatique — sessions explicites uniquement
    restart: "no"
